services:
  - type: web
    name: health-insights-agent-api
    runtime: python
    rootDir: back-end
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: DAILY_LIMIT
        value: "15"
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after deploying front-end
